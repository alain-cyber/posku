<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Posku Diagnostics</title>
<style>
  body { font-family: 'DM Mono', monospace; background: #111; color: #ccc; padding: 2rem; margin: 0; max-width: 900px; }
  h1 { color: #fff; margin: 0 0 0.5rem; font-size: 1.1rem; }
  .sub { color: #666; font-size: 0.75rem; margin-bottom: 1rem; }
  pre { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 1rem; white-space: pre-wrap; word-break: break-word; font-size: 0.8rem; color: #ccc; margin: 0; }
  .btn { background: #222; border: 1px solid #444; color: #ccc; padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.8rem; margin-bottom: 1rem; }
  .btn:hover { background: #333; }
</style>
</head>
<body>
<h1>Posku Diagnostics — last push</h1>
<p class="sub">Click Copy, paste to dev.</p>

<button class="btn" onclick="copyIt()">Copy</button>
<pre id="out">Loading…</pre>

<script>
let _blob = '';

function run() {
  let history = [];
  try { history = JSON.parse(localStorage.getItem('posku.push.history.v1') || '[]'); } catch {}
  if (!history.length) {
    _blob = 'No pushes captured yet. Push a SKU from posku, then refresh.';
  } else {
    const h = history[0];
    _blob = [
      `${h.at} · ${h.supplier} · ${h.sku} · env=${h.env}`,
      `response: ${h.response.ok ? 'OK' : 'FAIL'} ${h.response.status || ''} ${h.response.error || ''}`,
      '',
      'REQUEST:',
      JSON.stringify(h.request, null, 2),
      '',
      'RESPONSE:',
      JSON.stringify(h.response, null, 2),
    ].join('\n');
  }
  document.getElementById('out').textContent = _blob;
}

function copyIt() {
  navigator.clipboard.writeText(_blob);
}

run();
</script>
</body>
</html>
