<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Posku Diag</title>
<style>
  body { font-family: 'DM Mono', monospace; background: #111; color: #ccc; padding: 2rem; margin: 0; max-width: 1000px; }
  pre { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 1rem; white-space: pre-wrap; word-break: break-word; font-size: 0.8rem; color: #ccc; margin: 0 0 1rem; }
  .btn { background: #222; border: 1px solid #444; color: #ccc; padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.8rem; margin-bottom: 1rem; transition: background 0.13s, transform 0.08s, box-shadow 0.08s, filter 0.15s; user-select: none; }
  .btn:hover { background: #333; }
  .btn:active { transform: scale(0.96); box-shadow: inset 0 2px 5px rgba(0,0,0,0.4); filter: brightness(0.85); }
  .btn-flash { animation: btn-flash 0.35s ease-out; }
  @keyframes btn-flash { 0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.5); } 100% { box-shadow: 0 0 0 8px transparent; } }
</style>
</head>
<body>
<button class="btn" id="copy-btn" onclick="copyOut(this)">Copy</button>
<pre id="out">…</pre>

<script>
function copyOut(btn) {
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  const orig = btn.textContent;
  btn.textContent = 'Copied ✓';
  btn.classList.add('btn-flash');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('btn-flash'); }, 1200);
}

const REFERENCE_SKU = 'SMSCB743';  // known-good live SKU — used for field-name diffing

async function get(path, env) {
  const res = await fetch(path, {
    headers: { 'X-Posku-Env': env, 'Content-Type': 'application/json' },
    cache: 'no-store',
  });
  const text = await res.text();
  let data; try { data = JSON.parse(text); } catch { data = text; }
  return { status: res.status, data };
}

async function run() {
  let h;
  try { h = (JSON.parse(localStorage.getItem('posku.push.history.v1') || '[]'))[0]; } catch {}

  const lines = [];

  if (!h) {
    lines.push('(no pushes captured yet — push a SKU from posku to populate this section)');
  } else {
    lines.push(`${h.sku}  ·  env=${h.env}  ·  ${h.response.ok ? 'OK' : 'FAIL'} ${h.response.status || ''}  ${h.response.error || ''}`);
    lines.push('');
    lines.push('── REQUEST (what we sent) ──');
    lines.push(JSON.stringify(h.request?.body ?? h.request, null, 2));
    lines.push('');
    lines.push('── CREATE RESPONSE (server ack) ──');
    lines.push(JSON.stringify(h.response?.data ?? h.response, null, 2));

    const id = h.response?.data?.newProductId ?? h.response?.data?.id ?? h.response?.data?.product_id;
    if (id) {
      lines.push('', `── SAVED PRODUCT (GET /api/products/${id} · env=${h.env}) ──`);
      try {
        const r = await get(`/api/products/${id}`, h.env || 'test');
        lines.push(`HTTP ${r.status}`);
        lines.push(typeof r.data === 'string' ? r.data : JSON.stringify(r.data, null, 2));
      } catch (e) {
        lines.push(`fetch failed: ${e.message}`);
      }
    }
  }

  // Reference known-good SKU — always fetched from LIVE, regardless of push env.
  // We diff its column names against the saved-product response above to find
  // which keys the server actually populates correctly.
  lines.push('', `── REFERENCE SKU ${REFERENCE_SKU} (GET /api/products?sku=${REFERENCE_SKU} · env=live) ──`);
  try {
    const r = await get(`/api/products?sku=${encodeURIComponent(REFERENCE_SKU)}`, 'live');
    lines.push(`HTTP ${r.status}`);
    lines.push(typeof r.data === 'string' ? r.data : JSON.stringify(r.data, null, 2));
  } catch (e) {
    lines.push(`fetch failed: ${e.message}`);
  }

  // Inbox auto-attach diagnostic — stashed by the inbox-fetch flow.
  // Lets me see exactly which loads got CSVs auto-attached and why the
  // others didn't, without asking the user to open DevTools.
  let inbox;
  try { inbox = JSON.parse(localStorage.getItem('posku.inbox.diag.v1') || 'null'); } catch {}
  if (inbox) {
    lines.push('', `── LAST INBOX FETCH (${inbox.supplier} · ${inbox.fetchedAt}) ──`);
    lines.push(`messages=${inbox.msgCount}  ·  parsed=${inbox.allFoundCount}  ·  attached=${(inbox.autoAttached || []).length}  ·  failed=${(inbox.autoAttachFailed || []).length}`);
    if ((inbox.autoAttached || []).length) {
      lines.push('', 'auto-attached:');
      for (const a of inbox.autoAttached) lines.push(`  OK  ${a.sku || '(no sku)'}  load=${a.loadId}  rows=${a.rows}  src="${a.source || '?'}"`);
    }
    if ((inbox.autoAttachFailed || []).length) {
      lines.push('', 'NOT attached:');
      for (const f of inbox.autoAttachFailed) lines.push(`  XX  ${f.sku || '(no sku)'}  load=${f.loadId}  reason: ${f.reason}`);
    }
    if ((inbox.parseLog || []).length) {
      lines.push('', 'per-email:');
      for (const p of inbox.parseLog) {
        const atts = (p.attachments || []).map(a => `${a.filename}(${a.bytes || 0}b)`).join(', ') || '(none)';
        lines.push(`  · "${(p.subject || '').slice(0, 70)}"`);
        lines.push(`      from=${p.from || '—'}  body=${p.bodyLen}b  attachments=[${atts}]`);
        if ((p.attachmentsSkipped || []).length) {
          for (const s of p.attachmentsSkipped) {
            lines.push(`      ⚠ skipped "${s.filename}" — ${s.reason}${s.error ? ` (${s.error})` : ''}${s.size ? ` size=${s.size}` : ''}`);
          }
        }
        lines.push(`      parsed loads: ${(p.parsedManifests || []).join(', ') || '(0)'}`);
        for (const [loadId, m] of Object.entries(p.csvMatches || {})) {
          lines.push(`        load ${loadId} → picked "${m.picked || '(none)'}" ${m.exact ? '(exact match)' : m.fallback ? '(FALLBACK to attachments[0])' : ''}`);
        }
      }
    }
  }

  // Send-to-Sheet history — the last 10 append attempts (Sam's + Wayfair),
  // with the tab targeted and the full server response, so a failed push is
  // copy-pasteable here.
  let sheetHist;
  try { sheetHist = JSON.parse(localStorage.getItem('posku.sheet.history.v1') || '[]'); } catch {}
  if (sheetHist && sheetHist.length) {
    lines.push('', '── SEND TO SHEET (last ' + sheetHist.length + ') ──');
    for (const s of sheetHist) {
      lines.push(`  ${s.ok ? 'OK ' : 'XX '} ${s.at}  ${s.supplier || '?'}  sku=${s.sku || '?'}  tab="${s.tab}"  rows=${s.rows}  env=${s.env}  HTTP ${s.status ?? '?'}`);
      if (!s.ok || s.error) lines.push(`        response: ${(s.error ? s.error + ' · ' : '') + (s.response || '')}`.slice(0, 600));
    }
  }

  // Dropdown reference — id+name for packings and product_types so we can
  // verify the values posku is pinning are real options the API recognizes.
  lines.push('', '── DROPDOWNS (id → name for packings & product_types) ──');
  try {
    const envForDropdowns = h?.env || 'live';
    const r = await get('/api/products/dropdowns', envForDropdowns);
    lines.push(`HTTP ${r.status}  ·  env=${envForDropdowns}`);
    const d = r.data || {};
    const dump = (label, arr) => {
      if (!Array.isArray(arr)) { lines.push(`${label}: (not an array — got ${typeof arr})`); return; }
      lines.push(`${label} (${arr.length}):`);
      for (const x of arr) lines.push(`  ${String(x.id).padStart(5)}  ${x.name ?? x.label ?? '(no name)'}`);
    };
    dump('packings',      d.packings    ?? d.packing);
    dump('product_types', d.product_types ?? d.productTypes ?? d.productType ?? d.types);
  } catch (e) {
    lines.push(`fetch failed: ${e.message}`);
  }

  document.getElementById('out').textContent = lines.join('\n');
}
run();
</script>
</body>
</html>
