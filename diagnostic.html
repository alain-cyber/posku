<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Posku Diag</title>
<style>
  body { font-family: 'DM Mono', monospace; background: #111; color: #ccc; padding: 2rem; margin: 0; max-width: 1000px; }
  pre { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 1rem; white-space: pre-wrap; word-break: break-word; font-size: 0.8rem; color: #ccc; margin: 0 0 1rem; }
  .btn { background: #222; border: 1px solid #444; color: #ccc; padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.8rem; margin-bottom: 1rem; }
  .btn:hover { background: #333; }
</style>
</head>
<body>
<button class="btn" onclick="navigator.clipboard.writeText(document.getElementById('out').textContent)">Copy</button>
<pre id="out">…</pre>

<script>
async function run() {
  let h;
  try { h = (JSON.parse(localStorage.getItem('posku.push.history.v1') || '[]'))[0]; } catch {}
  if (!h) { document.getElementById('out').textContent = 'no pushes yet'; return; }

  const lines = [
    `${h.sku}  ·  env=${h.env}  ·  ${h.response.ok ? 'OK' : 'FAIL'} ${h.response.status || ''}  ${h.response.error || ''}`,
    '',
    '── REQUEST (what we sent) ──',
    JSON.stringify(h.request?.body ?? h.request, null, 2),
    '',
    '── CREATE RESPONSE (server ack) ──',
    JSON.stringify(h.response?.data ?? h.response, null, 2),
  ];

  // Try to fetch the product back so we can see what the server *actually saved*
  const id = h.response?.data?.newProductId ?? h.response?.data?.id ?? h.response?.data?.product_id;
  if (id) {
    lines.push('', `── SAVED PRODUCT (GET /api/products/${id}) ──`);
    try {
      const res = await fetch(`/api/products/${id}`, {
        headers: { 'X-Posku-Env': h.env || 'test', 'Content-Type': 'application/json' },
        cache: 'no-store',
      });
      const text = await res.text();
      let data; try { data = JSON.parse(text); } catch { data = text; }
      lines.push(`HTTP ${res.status}`);
      lines.push(typeof data === 'string' ? data : JSON.stringify(data, null, 2));
    } catch (e) {
      lines.push(`fetch failed: ${e.message}`);
    }
  } else {
    lines.push('', '(no product id in response — cannot fetch saved state)');
  }

  document.getElementById('out').textContent = lines.join('\n');
}
run();
</script>
</body>
</html>
