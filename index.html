<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Posku — Wayfair Load Builder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f6f1;
  --surface: #ffffff;
  --surface2: #efeee8;
  --surface3: #e3e2db;
  --border: rgba(0,0,0,0.11);
  --border2: rgba(0,0,0,0.20);
  --text: #14150f;
  --text2: #3b3d36;
  --text3: #696b62;
  --text4: #9a9c91;
  --green: #1e7f56;
  --green-dim: rgba(30,127,86,0.10);
  --red: #b8392c;
  --red-dim: rgba(184,57,44,0.10);
  --amber: #8a6510;
  --amber-dim: rgba(138,101,16,0.12);
  --blue: #1f5fbf;
  --blue-dim: rgba(31,95,191,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }

.header { padding: 1.5rem 2.5rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
.eyebrow { font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.2em; color: var(--text3); text-transform: uppercase; margin-bottom: 0.35rem; }
h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; font-weight: 400; letter-spacing: -0.01em; line-height: 1; }
h1 em { font-style: italic; color: var(--text2); }

.supplier-tabs { display: flex; gap: 0.25rem; padding: 0 2.5rem; background: var(--surface); border-bottom: 1px solid var(--border); }
.stab { padding: 0.8rem 1.1rem; font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text3); cursor: pointer; margin-bottom: -1px; transition: color 0.13s, border-color 0.13s; display: flex; align-items: center; gap: 0.4rem; }
.stab:hover:not(:disabled) { color: var(--text); }
.stab.active { color: var(--text); border-bottom-color: var(--green); }
.stab.soon { opacity: 0.5; cursor: default; }

.settings-bar { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 2.5rem; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.settings-bar label { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap; }
.settings-bar input { background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; padding: 0.4rem 0.65rem; font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--text); width: 260px; }
.settings-bar input:focus { outline: none; border-color: var(--green); }
.settings-bar input.key { width: 360px; }

main { padding: 2rem 2.5rem; max-width: 1440px; margin: 0 auto; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1.5rem; }
.card.dragging { border-color: var(--green); background: var(--green-dim); }
.card-title { font-family: 'DM Serif Display', serif; font-size: 1.25rem; margin-bottom: 0.2rem; }
.card-sub { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.1rem; }

textarea { width: 100%; min-height: 200px; background: var(--surface2); color: var(--text); border: 1px dashed var(--border2); border-radius: 10px; padding: 0.9rem 1rem; font-family: 'DM Mono', monospace; font-size: 0.82rem; line-height: 1.55; resize: vertical; transition: border-color 0.15s; }
textarea:focus { outline: none; border-style: solid; border-color: var(--green); background: #fff; }
textarea::placeholder { color: var(--text4); }

.btn { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.55rem 0.95rem; background: var(--green-dim); color: var(--green); border: 1px solid rgba(30,127,86,0.35); border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.13s, border-color 0.13s; white-space: nowrap; }
.btn:hover { background: rgba(30,127,86,0.18); border-color: var(--green); }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn.ghost { background: transparent; color: var(--text2); border-color: var(--border2); }
.btn.ghost:hover { color: var(--text); border-color: var(--text3); background: var(--surface2); }
.btn.danger { background: var(--red-dim); color: var(--red); border-color: rgba(184,57,44,0.35); }
.btn.danger:hover { background: rgba(184,57,44,0.18); border-color: var(--red); }
.btn.amber { background: var(--amber-dim); color: var(--amber); border-color: rgba(138,101,16,0.35); }
.btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; align-items: center; }

.hint { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--text4); margin-top: 0.5rem; }

/* status */
.status { margin-top: 0.85rem; padding: 0.55rem 0.8rem; border-radius: 7px; font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.03em; display: none; }
.status.show { display: block; }
.status.ok    { background: var(--green-dim); color: var(--green); border: 1px solid rgba(30,127,86,0.4); }
.status.err   { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(184,57,44,0.4); }
.status.warn  { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(138,101,16,0.4); }
.status.info  { background: var(--blue-dim);  color: var(--blue);  border: 1px solid rgba(31,95,191,0.4); }

/* loads section */
.loads-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.1rem; }
.loads-title { font-family: 'DM Serif Display', serif; font-size: 1.3rem; display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }

.table-wrap { overflow-x: auto; }
.table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
.table th { text-align: left; font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); padding: 0.55rem 0.6rem; border-bottom: 1px solid var(--border2); white-space: nowrap; }
.table td { padding: 0.65rem 0.6rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
.table tr:last-child td { border-bottom: none; }
.table tr:hover td { background: rgba(0,0,0,0.02); }
.table tr.review td { background: rgba(138,101,16,0.05); }
.table tr.done td { background: rgba(30,127,86,0.05); }
.table tr.failed td { background: rgba(184,57,44,0.05); }

.mono { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--text2); }
.mono-green { font-family: 'DM Mono', monospace; color: var(--green); font-size: 0.82rem; font-weight: 500; }
.mono-amber { font-family: 'DM Mono', monospace; color: var(--amber); font-size: 0.78rem; }
.chip { display: inline-block; padding: 0.18rem 0.48rem; border-radius: 5px; font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.05em; border: 1px solid var(--border2); background: var(--surface2); color: var(--text3); }
.chip.green  { background: var(--green-dim);  color: var(--green);  border-color: rgba(30,127,86,0.35); }
.chip.red    { background: var(--red-dim);    color: var(--red);    border-color: rgba(184,57,44,0.35); }
.chip.amber  { background: var(--amber-dim);  color: var(--amber);  border-color: rgba(138,101,16,0.35); }
.chip.blue   { background: var(--blue-dim);   color: var(--blue);   border-color: rgba(31,95,191,0.35); }

.edit-row { display: none; }
.edit-row td { padding: 0.5rem 0.6rem; background: var(--surface2); }
.edit-row.open { display: table-row; }
.edit-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 0.5rem; }
@media (max-width: 700px) { .edit-grid { grid-template-columns: 1fr 1fr; } }
.edit-field label { display: block; font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.3rem; }
.edit-field select, .edit-field input { width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: 6px; padding: 0.4rem 0.6rem; font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--text); }
.edit-field select:focus, .edit-field input:focus { outline: none; border-color: var(--green); }
.flags { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--amber); margin-top: 0.25rem; }

@media print {
  .settings-bar, .input-card, .btn-row, .no-print { display: none !important; }
  body { background: white; }
}
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="eyebrow">Posku · Load SKU builder</div>
    <h1>Load SKU <em>builder</em></h1>
  </div>
</header>

<nav class="supplier-tabs">
  <button class="stab active" data-supplier="WYF">Wayfair</button>
  <button class="stab soon" disabled>Harbor Freight <span class="chip" style="font-size:0.55rem;padding:0.1rem 0.35rem;">soon</span></button>
  <button class="stab soon" disabled>Amazon <span class="chip" style="font-size:0.55rem;padding:0.1rem 0.35rem;">soon</span></button>
  <button class="stab soon" disabled>Walmart <span class="chip" style="font-size:0.55rem;padding:0.1rem 0.35rem;">soon</span></button>
</nav>

<div class="settings-bar">
  <label>ERP base URL</label>
  <input type="url" id="cfg-url" placeholder="https://viatrading.biz">
  <label>API key</label>
  <input type="password" id="cfg-key" class="key" placeholder="ims_…">
  <button class="btn ghost" id="cfg-save" style="margin-left:0.25rem;">Save</button>
  <span id="cfg-status" style="font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--text4);"></span>
</div>

<main>
  <!-- Input card -->
  <div class="card input-card" id="drop-card">
    <div class="card-title">Paste or drop email</div>
    <div class="card-sub">One or multiple Wayfair load emails at once</div>
    <textarea id="email-input" placeholder="Paste email body here, or drag and drop a .eml / .txt file onto this card…"></textarea>
    <div class="hint">Tip: paste the email body, or drop a <strong>.eml</strong>, <strong>.txt</strong>, or Outlook <strong>.msg</strong> file.</div>
    <div class="btn-row">
      <button class="btn" id="parse-btn">Parse loads</button>
      <button class="btn ghost" id="clear-input-btn">Clear</button>
      <input type="file" id="file-input" multiple accept=".eml,.txt,.msg" style="display:none">
      <button class="btn ghost" id="pick-file-btn">Pick file</button>
    </div>
    <div id="parse-status" class="status"></div>
  </div>

  <!-- Loads section -->
  <div id="loads-section" style="display:none;">
    <div class="card">
      <div class="loads-header">
        <div class="loads-title">
          Detected loads
          <span id="summary-chips"></span>
        </div>
        <div class="btn-row" style="margin-top:0;">
          <button class="btn" id="push-all-btn">Push all ready to ERP</button>
          <button class="btn ghost" id="clear-loads-btn">Clear loads</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>Load ID</th>
              <th>Location</th>
              <th>Type</th>
              <th>Generated SKU</th>
              <th>Product name</th>
              <th>FOB state</th>
              <th>Condition</th>
              <th>Manifest</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="loads-body"></tbody>
        </table>
      </div>
      <div id="push-status" class="status" style="margin-top:1rem;"></div>
    </div>
  </div>
</main>

<script>
(() => {
const LS_CFG = 'posku.cfg.v3';

// ════════════════════════════════════════════════════════════════════════════
// SUPPLIER REGISTRY
// Each supplier is a self-contained config object.
// To add a new supplier: copy the WYF block, change the values, add to SUPPLIERS.
// ════════════════════════════════════════════════════════════════════════════
const SUPPLIERS = {

  // ── Wayfair ───────────────────────────────────────────────────────────────
  WYF: {
    label: 'Wayfair',
    erpSupplier: 770,   // supplier_id in viatrading
    storeId:     89,
    psku:        'LOAD-WYF',
    ptCode:      'LOAD-WYF',
    statusId:    2,
    packingTrait: 198,  // Load

    // FOB state IDs (from airbyte_sync.products_fob_states)
    fobIds: {
      PR: 5, LA: 5, JFL: 9, AMD: 20, RIL: 13,
      LTX: 43, KWA: 47, EKY: 17, MCDO: 10,
      CI: 51, POR: 37,
    },
    fobNames: {
      PR: 'California', LA: 'California', JFL: 'Florida', AMD: 'Maryland',
      RIL: 'Illinois', LTX: 'Texas', KWA: 'Washington', EKY: 'Kentucky',
      MCDO: 'Georgia', CI: 'CA-Los Angeles', POR: 'Oregon',
    },

    // Condition trait IDs (from airbyte_sync.products_traits)
    conditionTraits: { LQ: 63, S: 63, HDO: 63, A: 61, QC: 62 },
    conditionNames:  { LQ: 'Customer Returns', S: 'Customer Returns', HDO: 'Customer Returns', A: 'New Overstock', QC: 'Shelf Pulls' },

    // Manifest trait IDs (default = 603 Manifested; overrides below)
    manifestTraits: { S: 514 },  // Salvage = Unmanifested
    manifestNames:  { S: 'Unmanifested' },

    // Locations where type is always HDO (inferred from location, not email text)
    hdoLocations: new Set(['CI', 'POR']),

    // Location detection patterns (more specific first)
    locations: [
      { patterns: ['perris sp', 'perris lp', 'perris'],                              code: 'PR',   label: 'Perris CA' },
      { patterns: ['jacksonville'],                                                    code: 'JFL',  label: 'Jacksonville FL' },
      { patterns: ['aberdeen'],                                                        code: 'AMD',  label: 'Aberdeen MD' },
      { patterns: ['romeoville'],                                                      code: 'RIL',  label: 'Romeoville IL' },
      { patterns: ['lancaster, tx', 'lancaster tx', 'lancaster, t', 'lancaster'],     code: 'LTX',  label: 'Lancaster TX' },
      { patterns: ['lathrop'],                                                         code: 'LA',   label: 'Lathrop CA' },
      { patterns: ['kent, wa', 'kent wa', 'kent'],                                    code: 'KWA',  label: 'Kent WA' },
      { patterns: ['city of industry', 'coi'],                                        code: 'CI',   label: 'City of Industry CA' },
      { patterns: ['portland, or', 'portland or', 'portland'],                        code: 'POR',  label: 'Portland OR' },
      { patterns: ['mcdonough, ga', 'mcdonough ga', 'mcdonough'],                     code: 'MCDO', label: 'McDonough GA' },
      { patterns: ['kentucky', 'hebron', 'erlanger', 'walton', 'florence, ky', 'edgewood'], code: 'EKY', label: 'Kentucky' },
    ],

    // Load type detection patterns
    types: [
      { patterns: ['liquidation', ' lq ', '(lq)', '[lq]', 'lq-', '-lq'], code: 'LQ',  label: 'Liquidation' },
      { patterns: ['salvage', 'slvg', '(salvage)', '[salvage]'],           code: 'S',   label: 'Salvage' },
      { patterns: ['aged like new', 'aged '],                              code: 'A',   label: 'Aged' },
      { patterns: ['qc rejects', 'qc reject', ' qc ', '(qc)', '[qc]'],   code: 'QC',  label: 'QC' },
      { patterns: [' hdo ', '(hdo)', '[hdo]', 'hdo-', '-hdo'],            code: 'HDO', label: 'HDO' },
    ],

    // Product name derivation
    getProductName(typeCode, locCode) {
      if (!typeCode || !locCode) return '';
      if (typeCode === 'S')  return 'WYF Salvage Loads';
      if (typeCode === 'A')  return 'WYF Excess & Aged Inventory';
      if (typeCode === 'QC') return 'WYF QC Imperfection Loads';
      // LQ or HDO
      if (['PR','EKY','KWA'].includes(locCode))  return 'WYF Liquidation Returns - Smaller Items';
      return 'WYF Liquidation Returns - Smaller & Larger Items';
    },

    // SKU builder
    buildSKU(locCode, typeCode, loadId) {
      return 'WYF' + locCode + typeCode + loadId + '-test';
    },
  },

  // ── Harbor Freight (rules TBD) ────────────────────────────────────────────
  // HBF: { ... },

  // ── Amazon (rules TBD) ────────────────────────────────────────────────────
  // AMZ: { ... },

  // ── Walmart (rules TBD) ───────────────────────────────────────────────────
  // WMT: { ... },
};

let activeSupplier = 'WYF'; // tracks currently selected supplier tab

// ── Helpers ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function loadCfg() {
  try { return JSON.parse(localStorage.getItem(LS_CFG)) || {}; } catch { return {}; }
}
function saveCfg(c) { localStorage.setItem(LS_CFG, JSON.stringify(c)); }

function setStatus(el, kind, msg) { el.className = 'status show ' + kind; el.textContent = msg; }
function clearStatus(el) { el.className = 'status'; }

// ── Parser (supplier-aware) ──────────────────────────────────────────────────
function detectLocation(text, sup) {
  const lower = text.toLowerCase();
  for (const loc of sup.locations) {
    if (loc.patterns.some(p => lower.includes(p))) return loc.code;
  }
  return null;
}

function detectType(text, locCode, sup) {
  if (locCode && sup.hdoLocations && sup.hdoLocations.has(locCode)) return 'HDO';
  const lower = text.toLowerCase();
  for (const t of sup.types) {
    if (t.patterns.some(p => lower.includes(p))) return t.code;
  }
  return null;
}

function extractLoadIds(text) {
  const ids = new Set();
  const patterns = [
    // "Load ID: 50544" / "Load #50544" / "Load Number 50544"
    /\bload\s+(?:id|number|no\.?|#)?\s*[:\-#]?\s*([A-Z]{0,3}\d{4,6})\b/gi,
    // standalone load numbers in context
    /\b((?:LQ|SL|QC|AG)\d{3,6})\b/gi,
    // "#50544"
    /#\s*(\d{4,6})\b/g,
    // "Load 50544"
    /\bload\s+(\d{4,6})\b/gi,
    // standalone 5-6 digit numbers (e.g. from .msg filename: "Loads 50544 50545 50546")
    /\b(\d{5,6})\b/g,
  ];
  for (const rx of patterns) {
    let m;
    while ((m = rx.exec(text)) !== null) {
      const id = m[1].trim().toUpperCase();
      if (id.length >= 4) ids.add(id);
    }
  }
  return [...ids];
}

let loads = [];

function parseEmail(text, supplierKey) {
  if (!text.trim()) return [];
  const sup = SUPPLIERS[supplierKey];
  if (!sup) return [];

  const locCode  = detectLocation(text, sup);
  const typeCode = detectType(text, locCode, sup);
  const rawIds   = extractLoadIds(text);

  if (!rawIds.length) return [];

  return rawIds.map(loadId => {
    const flags = [];
    if (!locCode)  flags.push('Location not recognized — check the email');
    if (!typeCode) flags.push('Load type missing — check the email');
    const sku  = locCode && typeCode ? sup.buildSKU(locCode, typeCode, loadId) : null;
    const name = locCode && typeCode ? sup.getProductName(typeCode, locCode) : '';
    return {
      id:           'load_' + Date.now() + '_' + Math.random().toString(36).slice(2),
      supplierKey,
      loadId,
      locCode,
      typeCode,
      sku,
      name,
      fobId:         locCode ? sup.fobIds[locCode]          : null,
      fobName:       locCode ? sup.fobNames[locCode]        : '—',
      condTrait:     typeCode ? sup.conditionTraits[typeCode] : null,
      condName:      typeCode ? sup.conditionNames[typeCode]  : '—',
      manifestTrait: typeCode ? (sup.manifestTraits[typeCode] || 603) : null,
      manifestName:  typeCode ? (sup.manifestNames[typeCode]  || 'Manifested') : '—',
      flags,
      status:    flags.length ? 'review' : 'ready',
      erpResult: null,
    };
  });
}

// ── ERP API ──────────────────────────────────────────────────────────────────
async function erpRequest(method, path, body) {
  const cfg = loadCfg();
  if (!cfg.apiKey) return { ok: false, error: 'No API key configured. Set it in the settings bar above.' };
  const base = (cfg.baseUrl || 'https://viatrading.biz').replace(/\/+$/, '');
  try {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json', 'api-key': cfg.apiKey },
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(base + path, opts);
    let json = null;
    try { json = await res.json(); } catch {}
    return { ok: res.ok, status: res.status, data: json };
  } catch (err) {
    return { ok: false, error: err.message || 'Network error' };
  }
}

async function checkSKUExists(sku) {
  const r = await erpRequest('GET', '/api/products?sku=' + encodeURIComponent(sku));
  if (!r.ok && !r.status) return { error: r.error };
  // 404 → not found → safe to create. 200 with empty → safe. 200 with data → duplicate.
  if (r.status === 404) return { exists: false };
  if (r.ok && r.data) {
    const arr = Array.isArray(r.data) ? r.data : (Array.isArray(r.data?.data) ? r.data.data : null);
    if (arr !== null) return { exists: arr.length > 0 };
    // If it's an object with an id, it exists
    if (r.data?.id || r.data?.sku) return { exists: true };
  }
  return { exists: false };
}

function buildPayload(load) {
  const sup = SUPPLIERS[load.supplierKey] || SUPPLIERS.WYF;
  const traitIds = [sup.packingTrait, load.condTrait, load.manifestTrait].filter(Boolean);
  return {
    data: {
      sku:             load.sku,
      name:            load.name,
      psku:            sup.psku,
      psku_type:       'regular',
      store_id:        sup.storeId,
      supplier:        sup.erpSupplier,
      status_id:       sup.statusId,
      active:          0,
      cloud:           1,
      user_id:         183,
      user_id_created: 183,
      peachtree_code:  sup.ptCode,
    },
    i18n: {
      name:      load.name,
      lang_id:   '1',
      status_id: '1',
      slug:      load.sku.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
    },
    fob_link: load.fobId ? [
      { state_id: load.fobId, status_id: 1, user_id: 183 },
    ] : [],
    traits_link: traitIds.map(id => ({ product_trait_id: id, status_id: 1, user_id: 183 })),
  };
}

async function pushLoad(load) {
  if (!load.sku) return { ok: false, error: 'SKU not generated — fix location/type first.' };

  // 1. Dedup check
  const dup = await checkSKUExists(load.sku);
  if (dup.error) return { ok: false, error: dup.error };
  if (dup.exists) return { ok: false, skipped: true, error: `SKU ${load.sku} already exists in ERP.` };

  // 2. Create
  const payload = buildPayload(load);
  const r = await erpRequest('POST', '/api/products', payload);
  if (r.ok) {
    const erpId = r.data?.id ?? r.data?.data?.id ?? null;
    return { ok: true, erpId };
  }
  const errMsg = r.data?.message || r.data?.error || (r.error) || `HTTP ${r.status}`;
  return { ok: false, error: errMsg };
}

// ── Renderer ─────────────────────────────────────────────────────────────────
function renderLoads() {
  const body = $('loads-body');
  body.innerHTML = '';
  loads.forEach((load, idx) => {
    // main row
    const tr = document.createElement('tr');
    tr.id = 'row-' + idx;
    tr.className = load.status === 'review' ? 'review' : (load.status === 'done' ? 'done' : (load.status === 'failed' ? 'failed' : ''));

    const statusChip = () => {
      if (load.status === 'done')   return `<span class="chip green">pushed</span>`;
      if (load.status === 'failed') return `<span class="chip red">failed</span>`;
      if (load.status === 'review') return `<span class="chip amber">review</span>`;
      if (load.status === 'pushing') return `<span class="chip blue">pushing…</span>`;
      if (load.status === 'dup')    return `<span class="chip">duplicate</span>`;
      return `<span class="chip green" style="background:var(--green-dim);color:var(--green);">ready</span>`;
    };

    tr.innerHTML = `
      <td class="mono">${esc(load.loadId)}</td>
      <td><span class="mono">${esc(load.locCode || '—')}</span></td>
      <td><span class="mono">${esc(load.typeCode || '—')}</span></td>
      <td>${load.sku ? `<span class="mono-green">${esc(load.sku)}</span>` : `<span class="mono-amber">—</span>`}</td>
      <td style="font-size:0.8rem;color:var(--text2);max-width:220px;">${esc(load.name || '—')}</td>
      <td class="mono">${esc(load.fobName)}</td>
      <td style="font-size:0.78rem;">${esc(load.condName)}</td>
      <td style="font-size:0.78rem;">${esc(load.manifestName)}</td>
      <td>${statusChip()}</td>
      <td style="white-space:nowrap;">
        ${load.status !== 'done' && load.status !== 'pushing' ? `
          <button class="btn small" data-push="${idx}" ${!load.sku ? 'disabled' : ''}>Push</button>
          <button class="btn ghost small" data-edit="${idx}">Edit</button>
        ` : ''}
        <button class="btn danger small" data-remove="${idx}">×</button>
      </td>`;

    // edit row
    const er = document.createElement('tr');
    er.id = 'edit-' + idx;
    er.className = 'edit-row';
    er.innerHTML = `<td colspan="10">
      <div class="edit-grid">
        <div class="edit-field">
          <label>Load ID</label>
          <input type="text" data-field="loadId" value="${esc(load.loadId)}">
        </div>
        <div class="edit-field">
          <label>Location code</label>
          <select data-field="locCode">
            <option value="">— unknown —</option>
            ${Object.keys(SUPPLIERS[activeSupplier].fobIds).map(c => `<option value="${c}" ${load.locCode === c ? 'selected' : ''}>${c} — ${SUPPLIERS[activeSupplier].fobNames[c]}</option>`).join('')}
          </select>
        </div>
        <div class="edit-field">
          <label>Type code</label>
          <select data-field="typeCode">
            <option value="">— unknown —</option>
            <option value="LQ"  ${load.typeCode==='LQ'  ? 'selected' : ''}>LQ — Liquidation</option>
            <option value="S"   ${load.typeCode==='S'   ? 'selected' : ''}>S — Salvage</option>
            <option value="A"   ${load.typeCode==='A'   ? 'selected' : ''}>A — Aged</option>
            <option value="QC"  ${load.typeCode==='QC'  ? 'selected' : ''}>QC — QC Rejects</option>
            <option value="HDO" ${load.typeCode==='HDO' ? 'selected' : ''}>HDO</option>
          </select>
        </div>
        <div class="edit-field" style="align-self:end;">
          <label>&nbsp;</label>
          <div style="display:flex;gap:0.4rem;">
            <button class="btn" data-apply="${idx}">Apply</button>
            <button class="btn ghost" data-cancel="${idx}">Cancel</button>
          </div>
        </div>
      </div>
      ${load.flags.length ? `<div class="flags">⚠ ${load.flags.join(' · ')}</div>` : ''}
    </td>`;

    body.appendChild(tr);
    body.appendChild(er);

    if ((load.status === 'failed' || load.status === 'dup') && load.erpResult) {
      const msgRow = document.createElement('tr');
      msgRow.innerHTML = `<td colspan="10" style="padding:0.5rem 0.8rem;background:${load.status==='failed'?'var(--red-dim)':'var(--surface2)'};border-bottom:1px solid var(--border);">
        <span class="mono" style="color:${load.status==='failed'?'var(--red)':'var(--text2)'};font-size:0.74rem;">
          ${load.status==='failed' ? '✗' : 'ℹ'} ${esc(load.erpResult)}
        </span>
      </td>`;
      body.appendChild(msgRow);
    }
  });

  updateSummary();
  attachHandlers();
}

function updateSummary() {
  const ready   = loads.filter(l => l.status === 'ready').length;
  const review  = loads.filter(l => l.status === 'review').length;
  const done    = loads.filter(l => l.status === 'done').length;
  const failed  = loads.filter(l => l.status === 'failed').length;
  const chips = [];
  if (ready)  chips.push(`<span class="chip green">${ready} ready</span>`);
  if (review) chips.push(`<span class="chip amber">${review} needs review</span>`);
  if (done)   chips.push(`<span class="chip" style="background:var(--green-dim);color:var(--green);border-color:rgba(30,127,86,.35);">${done} pushed</span>`);
  if (failed) chips.push(`<span class="chip red">${failed} failed</span>`);
  $('summary-chips').innerHTML = chips.join(' ');
}

function attachHandlers() {
  $('loads-body').querySelectorAll('[data-push]').forEach(b => {
    b.onclick = async () => {
      const idx = +b.dataset.push;
      await doPush([idx]);
    };
  });
  $('loads-body').querySelectorAll('[data-edit]').forEach(b => {
    b.onclick = () => {
      const idx = +b.dataset.edit;
      $('edit-' + idx).classList.toggle('open');
    };
  });
  $('loads-body').querySelectorAll('[data-cancel]').forEach(b => {
    b.onclick = () => {
      $('edit-' + +b.dataset.cancel).classList.remove('open');
    };
  });
  $('loads-body').querySelectorAll('[data-apply]').forEach(b => {
    b.onclick = () => {
      const idx = +b.dataset.apply;
      const er = $('edit-' + idx);
      const load = loads[idx];
      const sup = SUPPLIERS[load.supplierKey] || SUPPLIERS.WYF;
      load.loadId  = er.querySelector('[data-field="loadId"]').value.trim().toUpperCase() || load.loadId;
      load.locCode  = er.querySelector('[data-field="locCode"]').value  || null;
      load.typeCode = er.querySelector('[data-field="typeCode"]').value || null;
      load.sku           = load.locCode && load.typeCode ? sup.buildSKU(load.locCode, load.typeCode, load.loadId) : null;
      load.name          = sup.getProductName(load.typeCode, load.locCode);
      load.fobId         = load.locCode ? sup.fobIds[load.locCode] : null;
      load.fobName       = load.locCode ? sup.fobNames[load.locCode] : '—';
      load.condTrait     = load.typeCode ? sup.conditionTraits[load.typeCode] : null;
      load.condName      = load.typeCode ? sup.conditionNames[load.typeCode]  : '—';
      load.manifestTrait = load.typeCode ? (sup.manifestTraits[load.typeCode] || 603) : null;
      load.manifestName  = load.typeCode ? (sup.manifestNames[load.typeCode]  || 'Manifested') : '—';
      load.flags = [];
      if (!load.locCode)  load.flags.push('Location not set');
      if (!load.typeCode) load.flags.push('Type not set');
      load.status = load.flags.length ? 'review' : 'ready';
      er.classList.remove('open');
      renderLoads();
    };
  });
  $('loads-body').querySelectorAll('[data-remove]').forEach(b => {
    b.onclick = () => {
      loads.splice(+b.dataset.remove, 1);
      if (!loads.length) $('loads-section').style.display = 'none';
      else renderLoads();
    };
  });
}

async function doPush(indices) {
  const cfg = loadCfg();
  if (!cfg.apiKey) {
    setStatus($('push-status'), 'err', 'API key not set. Enter it in the settings bar and click Save.');
    return;
  }
  clearStatus($('push-status'));
  for (const idx of indices) {
    const load = loads[idx];
    if (!load || load.status === 'done') continue;
    load.status = 'pushing';
    renderLoads();
    const result = await pushLoad(load);
    if (result.ok) {
      load.status = 'done';
      load.erpResult = `ERP id: ${result.erpId ?? 'n/a'}`;
    } else if (result.skipped) {
      load.status = 'dup';
      load.erpResult = result.error;
    } else {
      load.status = 'failed';
      load.erpResult = result.error;
    }
    renderLoads();
  }
  const done = loads.filter(l => l.status === 'done').length;
  const failed = loads.filter(l => l.status === 'failed').length;
  const dup = loads.filter(l => l.status === 'dup').length;
  const parts = [];
  if (done)   parts.push(`${done} pushed OK`);
  if (dup)    parts.push(`${dup} duplicate(s) skipped`);
  if (failed) parts.push(`${failed} failed`);
  if (parts.length) setStatus($('push-status'), failed ? 'err' : 'ok', parts.join(' · '));
}

// ── Settings bar ─────────────────────────────────────────────────────────────
function initSettings() {
  const cfg = loadCfg();
  $('cfg-url').value = cfg.baseUrl || 'https://viatrading.biz';
  $('cfg-key').value = cfg.apiKey  || '';
}

$('cfg-save').onclick = () => {
  saveCfg({ baseUrl: $('cfg-url').value.trim(), apiKey: $('cfg-key').value.trim() });

// ── Drag / drop ───────────────────────────────────────────────────────────────
const card = $('drop-card');
['dragenter','dragover'].forEach(e => card.addEventListener(e, ev => { ev.preventDefault(); card.classList.add('dragging'); }));
['dragleave','drop'].forEach(e => card.addEventListener(e, ev => {
  if (e === 'dragleave' && card.contains(ev.relatedTarget)) return;
  card.classList.remove('dragging');
}));
card.addEventListener('drop', ev => {
  ev.preventDefault();
  const files = [...(ev.dataTransfer.files || [])];
  if (files.length) {
    loadFiles(files);
  } else {
    const text = ev.dataTransfer.getData('text');
    if (text) $('email-input').value = (($('email-input').value || '') + '\n\n' + text).trim();
  }
});

$('pick-file-btn').onclick = () => $('file-input').click();
$('file-input').onchange = ev => {
  loadFiles([...(ev.target.files || [])]);
  ev.target.value = '';
};

// ── .eml MIME decoder (handles quoted-printable + base64 bodies) ─────────────
function decodeQP(str) {
  return str.replace(/=\r?\n/g, '').replace(/=([0-9A-Fa-f]{2})/g, (_, h) => String.fromCharCode(parseInt(h, 16)));
}

function extractEmlText(raw) {
  // Split headers from body
  const sep = raw.indexOf('\r\n\r\n') >= 0 ? '\r\n\r\n' : '\n\n';
  const splitAt = raw.indexOf(sep);
  if (splitAt < 0) return raw;
  const hdrs = raw.slice(0, splitAt).toLowerCase();
  let body = raw.slice(splitAt + sep.length);

  // Multipart: grab the first text/plain or text/html part
  const boundaryMatch = hdrs.match(/boundary="?([^"\r\n;]+)"?/);
  if (boundaryMatch) {
    const boundary = '--' + boundaryMatch[1];
    const parts = raw.split(boundary);
    // prefer text/plain, fall back to text/html
    const plain = parts.find(p => /content-type:\s*text\/plain/i.test(p));
    const html  = parts.find(p => /content-type:\s*text\/html/i.test(p));
    const part  = plain || html;
    if (part) {
      const pSep = part.indexOf('\r\n\r\n') >= 0 ? '\r\n\r\n' : '\n\n';
      const pSplit = part.indexOf(pSep);
      const pHdrs = part.slice(0, pSplit).toLowerCase();
      body = part.slice(pSplit + pSep.length).replace(/--$/, '').trim();
      if (pHdrs.includes('quoted-printable')) body = decodeQP(body);
      else if (pHdrs.includes('base64')) { try { body = atob(body.replace(/\s/g, '')); } catch {} }
      if (html && !plain) body = body.replace(/<[^>]+>/g, ' ').replace(/&nbsp;/gi, ' ').replace(/&amp;/gi, '&').replace(/&lt;/gi, '<').replace(/&gt;/gi, '>');
    }
    return body;
  }

  // Simple single-part
  if (hdrs.includes('quoted-printable')) body = decodeQP(body);
  else if (hdrs.includes('base64')) { try { body = atob(body.replace(/\s/g, '')); } catch {} }
  if (hdrs.includes('text/html')) body = body.replace(/<[^>]+>/g, ' ').replace(/&nbsp;/gi, ' ');
  return body;
}

function isBinary(content) {
  // Check for high ratio of non-printable chars — sign of a .msg binary file
  let nonPrintable = 0;
  const sample = content.slice(0, 512);
  for (let i = 0; i < sample.length; i++) {
    const c = sample.charCodeAt(i);
    if (c < 9 || (c > 13 && c < 32) || c === 127) nonPrintable++;
  }
  return nonPrintable / sample.length > 0.1;
}

// ── Outlook .msg parser (OLE2 / CFB format) ──────────────────────────────────
// Reads subject + plain-text body from the binary compound document.
// Returns { subject, body } strings, or null if the file isn't a valid .msg.
function parseMsgBuffer(ab) {
  const dv = new DataView(ab);
  const u8 = new Uint8Array(ab);
  if (dv.getUint32(0, false) !== 0xD0CF11E0 || dv.getUint32(4, false) !== 0xA1B11AE1) return null;

  const SS   = 1 << dv.getUint16(30, true);  // sector size (usually 512)
  const MS   = 1 << dv.getUint16(32, true);  // mini-sector size (usually 64)
  const MCUT = dv.getUint32(56, true);        // mini-stream cutoff (usually 4096)
  const DIR0 = dv.getUint32(48, true);        // first directory sector
  const MF0  = dv.getInt32(60, true);         // first mini-FAT sector
  const soff = n => (n + 1) * SS;            // byte offset of sector n

  // Build FAT from the 109 DIFAT slots in the header
  // (covers files up to ~7 MB — plenty for any email)
  const fat = [];
  for (let i = 0; i < 109; i++) {
    const sid = dv.getInt32(76 + i * 4, true);
    if (sid < 0) break;
    const base = soff(sid);
    for (let j = 0; j < SS / 4; j++) fat.push(dv.getInt32(base + j * 4, true));
  }

  const chain = s => { const r = []; while (s >= 0 && s < 0x7FFFFFFF) { r.push(s); s = fat[s]; } return r; };

  // Read a chain of sectors into a fresh Uint8Array
  const readFat = (start, size) => {
    const secs = chain(start);
    const buf  = new Uint8Array(secs.length * SS);
    secs.forEach((s, i) => buf.set(u8.subarray(soff(s), soff(s) + SS), i * SS));
    return buf.subarray(0, Math.min(size, buf.length));
  };

  // Read directory entries (128 bytes each)
  const dirBuf = readFat(DIR0, chain(DIR0).length * SS);
  const dirDV  = new DataView(dirBuf.buffer);  // byteOffset=0 because readFat returns a fresh buffer
  const entries = [];
  for (let i = 0; i * 128 < dirBuf.length; i++) {
    const o    = i * 128;
    const nLen = dirDV.getUint16(o + 64, true);
    if (nLen < 2) { entries.push(null); continue; }
    entries.push({
      name:  new TextDecoder('utf-16le').decode(dirBuf.subarray(o, o + nLen - 2)),
      type:  dirBuf[o + 66],
      child: dirDV.getInt32(o + 76, true),
      start: dirDV.getInt32(o + 116, true),
      size:  dirDV.getUint32(o + 120, true),
    });
  }

  // Mini-FAT and mini-stream (root entry index 0 holds the mini-stream data)
  let miniFat = [], miniStream = null;
  if (MF0 >= 0) {
    const mfBuf = new Uint8Array(chain(MF0).length * SS);
    chain(MF0).forEach((s, i) => mfBuf.set(u8.subarray(soff(s), soff(s) + SS), i * SS));
    const mfDV = new DataView(mfBuf.buffer);
    for (let i = 0; i < mfBuf.length / 4; i++) miniFat.push(mfDV.getInt32(i * 4, true));
    const root = entries[0];
    if (root && root.start >= 0) miniStream = readFat(root.start, root.size);
  }
  const mchain = s => { const r = []; while (s >= 0 && s < 0x7FFFFFFF) { r.push(s); s = miniFat[s]; } return r; };
  const readMini = (start, size) => {
    const secs = mchain(start);
    const buf  = new Uint8Array(secs.length * MS);
    if (miniStream) secs.forEach((s, i) => buf.set(miniStream.subarray(s * MS, Math.min(s * MS + MS, miniStream.length)), i * MS));
    return buf.subarray(0, Math.min(size, buf.length));
  };

  // Index all stream entries by name for lookup
  const byName = new Map();
  entries.forEach(e => e && e.type === 2 && byName.set(e.name, e));

  const readStream = name => {
    const e = byName.get(name);
    if (!e) return null;
    return (miniStream && e.size < MCUT) ? readMini(e.start, e.size) : readFat(e.start, e.size);
  };

  // Try Unicode (001F) then ANSI (001E) for a given property ID
  const prop = propId => {
    const u16 = readStream(`__substg1.0_${propId}001F`);
    if (u16) return new TextDecoder('utf-16le').decode(u16).replace(/\0+$/, '');
    const u8s = readStream(`__substg1.0_${propId}001E`);
    if (u8s) return new TextDecoder().decode(u8s).replace(/\0+$/, '');
    return null;
  };

  return { subject: prop('0037'), body: prop('1000') };
}

function loadFiles(files) {
  let pending = files.length;
  files.forEach(f => {
    const ext = f.name.split('.').pop().toLowerCase();
    if (ext === 'msg') {
      const r = new FileReader();
      r.onload = () => {
        let text = '';
        try {
          const parsed = parseMsgBuffer(r.result);
          if (parsed) {
            text = [parsed.subject, parsed.body].filter(Boolean).join('\n\n');
            setStatus($('parse-status'), 'info', `Outlook .msg read — subject + body extracted.`);
          }
        } catch (e) { /* fall through to filename fallback */ }
        if (!text.trim()) {
          // Filename is the email subject — strip extension, underscores, trailing duplicate counter
          text = f.name.replace(/\.msg$/i, '').replace(/_+/g, ' ').replace(/\s*-\s*\d+$/, '');
          setStatus($('parse-status'), 'warn', `Could not read .msg body — parsed from filename only.`);
        }
        $('email-input').value = (($('email-input').value || '').trimEnd() + '\n\n' + text.trim()).trim();
        if (--pending === 0) triggerParse();
      };
      r.readAsArrayBuffer(f);
      return;
    }
    const r = new FileReader();
    r.onload = () => {
      let text = r.result;
      if (isBinary(text)) {
        setStatus($('parse-status'), 'err',
          `"${f.name}" appears to be a binary file. Please save the email as .eml or .txt and drop that instead.`);
        if (--pending === 0) { /* skip */ }
        return;
      }
      if (ext === 'eml') text = extractEmlText(text);
      $('email-input').value = (($('email-input').value || '').trimEnd() + '\n\n' + text.trim()).trim();
      if (--pending === 0) triggerParse();
    };
    r.readAsText(f);
  });
}

// ── Parse ────────────────────────────────────────────────────────────────────
function triggerParse() {
  const text = $('email-input').value.trim();
  clearStatus($('parse-status'));
  if (!text) { setStatus($('parse-status'), 'warn', 'Nothing to parse.'); return; }

  const found = parseEmail(text, activeSupplier);
  if (!found.length) {
    setStatus($('parse-status'), 'warn', 'No load IDs found. Make sure the email includes a load number (e.g. "Load ID: 50544").');
    return;
  }

  // Merge: avoid duplicates by loadId+locCode+typeCode
  const existing = new Set(loads.map(l => l.loadId + '|' + l.locCode + '|' + l.typeCode));
  const added = found.filter(l => !existing.has(l.loadId + '|' + l.locCode + '|' + l.typeCode));

  loads.push(...added);
  $('loads-section').style.display = '';
  renderLoads();

  const reviewCount = added.filter(l => l.flags.length).length;
  const msg = `Found ${added.length} load(s)` +
    (found.length > added.length ? `, ${found.length - added.length} already in list` : '') +
    (reviewCount ? ` · ${reviewCount} need review` : '');
  setStatus($('parse-status'), reviewCount ? 'warn' : 'ok', msg);
}

$('parse-btn').onclick = triggerParse;
$('email-input').addEventListener('keydown', e => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') triggerParse(); });

$('clear-input-btn').onclick = () => {
  $('email-input').value = '';
  clearStatus($('parse-status'));
};

$('push-all-btn').onclick = async () => {
  const readyIdx = loads.map((l,i) => l.status === 'ready' ? i : -1).filter(i => i >= 0);
  if (!readyIdx.length) { setStatus($('push-status'), 'warn', 'No ready loads to push.'); return; }
  await doPush(readyIdx);
};

$('clear-loads-btn').onclick = () => {
  if (!loads.length || confirm('Clear all detected loads?')) {
    loads = [];
    $('loads-section').style.display = 'none';
    clearStatus($('push-status'));
  }
};

// ── Supplier tabs ─────────────────────────────────────────────────────────────
document.querySelectorAll('.stab[data-supplier]').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeSupplier = tab.dataset.supplier;
    // Clear loads when switching suppliers to avoid cross-supplier confusion
    if (loads.length) {
      if (confirm('Switch to ' + (SUPPLIERS[activeSupplier]?.label || activeSupplier) + '? This will clear the current loads list.')) {
        loads = [];
        $('loads-section').style.display = 'none';
        clearStatus($('push-status'));
      } else {
        // revert
        document.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
        document.querySelector('.stab[data-supplier="' + (loads[0]?.supplierKey || 'WYF') + '"]')?.classList.add('active');
        activeSupplier = loads[0]?.supplierKey || 'WYF';
      }
    }
  };
});

// ── Init ──────────────────────────────────────────────────────────────────────
initSettings();
})();
