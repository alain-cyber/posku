<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Posku — Capture</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f1;
    --surface: #ffffff;
    --surface2: #efeee8;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --text: #14150f;
    --text2: #3b3d36;
    --text3: #696b62;
    --text4: #9a9c91;
    --green: #1e7f56;
    --green-dim: rgba(30,127,86,0.10);
    --red: #b8392c;
    --red-dim: rgba(184,57,44,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  .header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.4rem;
    font-weight: 400;
    letter-spacing: -0.01em;
    line-height: 1;
  }

  h1 em { font-style: italic; color: var(--text2); }

  .sub {
    color: var(--text2);
    font-size: 0.95rem;
    margin-top: 0.75rem;
    max-width: 640px;
  }

  main {
    padding: 2.5rem;
    max-width: 980px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.75rem;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .card.dragging {
    border-color: var(--green);
    background: var(--green-dim);
  }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    margin-bottom: 0.25rem;
  }

  .card-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  textarea {
    width: 100%;
    min-height: 360px;
    background: var(--surface2);
    color: var(--text);
    border: 1px dashed var(--border2);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    line-height: 1.6;
    resize: vertical;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  textarea:focus {
    outline: none;
    border-style: solid;
    border-color: var(--green);
    background: #fff;
  }

  textarea::placeholder { color: var(--text4); }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 1rem;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.6rem 1rem;
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(30,127,86,0.35);
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .btn:hover { background: rgba(30,127,86,0.16); border-color: var(--green); }

  .btn.ghost {
    background: transparent;
    color: var(--text2);
    border-color: var(--border2);
  }
  .btn.ghost:hover { color: var(--text); border-color: var(--text3); background: var(--surface2); }

  .btn.danger {
    background: var(--red-dim);
    color: var(--red);
    border-color: rgba(184,57,44,0.35);
  }
  .btn.danger:hover { background: rgba(184,57,44,0.16); border-color: var(--red); }

  .meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text3);
    letter-spacing: 0.05em;
  }

  .file-list {
    margin-top: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .file-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.4rem 0.7rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text2);
    width: fit-content;
    max-width: 100%;
  }
  .file-pill .name { color: var(--text); }
  .file-pill .size { color: var(--text3); }

  .drop-hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text3);
    letter-spacing: 0.05em;
    margin-top: 0.6rem;
  }
</style>
</head>
<body>

<header class="header">
  <div class="eyebrow">Posku · capture</div>
  <h1>Drop it <em>in here</em></h1>
  <p class="sub">Paste anything, or drag and drop an email (or any file). It just sits here for now — next steps come later.</p>
</header>

<main>
  <div class="card" id="drop-card">
    <div class="card-title">Capture</div>
    <div class="card-sub">Paste · drop · type</div>

    <textarea id="content" placeholder="Paste info here, or drop a file anywhere on this card…"></textarea>
    <div class="drop-hint">Tip: drag a <code>.eml</code>, <code>.msg</code>, <code>.txt</code>, <code>.csv</code> or any text file onto this card to load its contents.</div>

    <div id="files" class="file-list"></div>

    <div class="row">
      <div class="meta" id="meta">0 chars</div>
      <div class="btn-row">
        <input type="file" id="file-input" multiple style="display:none">
        <button class="btn" id="pick">Pick file</button>
        <button class="btn ghost" id="copy">Copy</button>
        <button class="btn danger" id="clear">Clear</button>
      </div>
    </div>
  </div>
</main>

<script>
(() => {
  const LS_KEY = 'posku.capture.v1';
  const $ = (id) => document.getElementById(id);
  const ta = $('content');
  const card = $('drop-card');
  const meta = $('meta');
  const files = $('files');

  const fmtSize = (n) => n < 1024 ? n + ' B' : n < 1024 * 1024 ? (n / 1024).toFixed(1) + ' KB' : (n / 1024 / 1024).toFixed(1) + ' MB';

  ta.value = localStorage.getItem(LS_KEY) || '';
  updateMeta();

  ta.addEventListener('input', () => {
    localStorage.setItem(LS_KEY, ta.value);
    updateMeta();
  });

  function updateMeta() {
    const v = ta.value;
    const lines = v ? v.split('\n').length : 0;
    meta.textContent = `${v.length.toLocaleString()} chars · ${lines.toLocaleString()} lines`;
  }

  // --- Drag and drop ---
  ['dragenter', 'dragover'].forEach(e => card.addEventListener(e, (ev) => {
    ev.preventDefault();
    card.classList.add('dragging');
  }));
  ['dragleave', 'drop'].forEach(e => card.addEventListener(e, (ev) => {
    if (e === 'dragleave' && card.contains(ev.relatedTarget)) return;
    card.classList.remove('dragging');
  }));
  card.addEventListener('drop', (ev) => {
    ev.preventDefault();
    const list = [...(ev.dataTransfer.files || [])];
    if (list.length) loadFiles(list);
    else {
      const text = ev.dataTransfer.getData('text');
      if (text) appendText(text);
    }
  });

  // --- File picker ---
  $('pick').onclick = () => $('file-input').click();
  $('file-input').onchange = (ev) => {
    const list = [...(ev.target.files || [])];
    if (list.length) loadFiles(list);
    ev.target.value = '';
  };

  function loadFiles(list) {
    list.forEach(f => {
      const reader = new FileReader();
      reader.onload = () => {
        const text = typeof reader.result === 'string' ? reader.result : '';
        appendText(`\n\n===== ${f.name} (${fmtSize(f.size)}) =====\n${text}`);
        addPill(f);
      };
      reader.readAsText(f);
    });
  }

  function appendText(t) {
    ta.value = (ta.value ? ta.value.trimEnd() + '\n' : '') + t.trimStart();
    localStorage.setItem(LS_KEY, ta.value);
    updateMeta();
  }

  function addPill(f) {
    const pill = document.createElement('div');
    pill.className = 'file-pill';
    pill.innerHTML = `<span class="name"></span><span class="size"></span>`;
    pill.querySelector('.name').textContent = f.name;
    pill.querySelector('.size').textContent = fmtSize(f.size);
    files.appendChild(pill);
  }

  // --- Buttons ---
  $('copy').onclick = async () => {
    if (!ta.value) return;
    try {
      await navigator.clipboard.writeText(ta.value);
      flash($('copy'), 'Copied');
    } catch {
      ta.select();
      document.execCommand('copy');
      flash($('copy'), 'Copied');
    }
  };

  $('clear').onclick = () => {
    if (!ta.value && !files.children.length) return;
    if (!confirm('Clear everything?')) return;
    ta.value = '';
    files.innerHTML = '';
    localStorage.removeItem(LS_KEY);
    updateMeta();
  };

  function flash(btn, msg) {
    const orig = btn.textContent;
    btn.textContent = msg;
    setTimeout(() => btn.textContent = orig, 1100);
  }
})();
</script>
</body>
</html>
